syntax = "proto3";

package dagents.agents.v1;

option go_package = "github.com/pradyunuydarp/Dagents/contracts/grpc/dagents/agents/v1;agentsv1";

message AgentIdentity {
  string agent_id = 1;
  string workspace_id = 2;
  string name = 3;
  string agent_type = 4;
}

message RegisterRequest {
  AgentIdentity agent = 1;
  map<string, string> scope = 2;
  string version = 3;
  repeated string capabilities = 4;
}

message RegisterResponse {
  bool accepted = 1;
  string deployment_plan_id = 2;
  repeated string capabilities = 3;
}

message HeartbeatRequest {
  AgentIdentity agent = 1;
  string status = 2;
  int64 timestamp = 3;
}

message HeartbeatResponse {
  bool ack = 1;
  string desired_state = 2;
}

message TelemetryPoint {
  string key = 1;
  double value = 2;
  map<string, string> labels = 3;
  int64 observed_at = 4;
}

message TelemetryEnvelope {
  AgentIdentity agent = 1;
  repeated TelemetryPoint metrics = 2;
  map<string, string> pointers = 3;
}

message TelemetryAck {
  bool ack = 1;
  string ingestion_id = 2;
}

message DeploymentSyncRequest {
  AgentIdentity agent = 1;
  string bundle_id = 2;
  string bundle_version = 3;
}

message DeploymentSyncResponse {
  bool up_to_date = 1;
  string plan_token = 2;
  string config_digest = 3;
  string desired_bundle_id = 4;
  string desired_bundle_version = 5;
  string desired_bundle_uri = 6;
}

message DeployBundleCommand {
  AgentIdentity agent = 1;
  string bundle_id = 2;
  string bundle_version = 3;
  string bundle_uri = 4;
  bytes signature = 5;
}

message TriggerRunCommand {
  AgentIdentity agent = 1;
  string correlation_id = 2;
  string bundle_id = 3;
  string bundle_version = 4;
  map<string, string> scope = 5;
}

message CommandStatus {
  bool accepted = 1;
  string message = 2;
}

message ConnectionRef {
  string connection_id = 1;
  map<string, string> options = 2;
}

message SourceBatching {
  int32 batch_size = 1;
  int32 max_records = 2;
}

message InlineSelection {
  repeated string records_json = 1;
}

message PostgresSelection {
  string sql = 1;
  string table = 2;
  repeated string columns = 3;
  string where = 4;
  repeated string order_by = 5;
}

message MongoSelection {
  string database = 1;
  string collection = 2;
  string filter_json = 3;
  string projection_json = 4;
  repeated string sort = 5;
}

message ObjectStorageSelection {
  string uri = 1;
  string prefix = 2;
  string glob = 3;
  string compression = 4;
}

message SourceSpec {
  string source_id = 1;
  string kind = 2;
  ConnectionRef connection_ref = 3;
  SourceBatching batching = 4;
  map<string, string> schema_hint = 5;
  map<string, string> checkpoint = 6;
  map<string, string> options = 7;
  oneof selection {
    InlineSelection inline = 8;
    PostgresSelection postgres = 9;
    MongoSelection mongodb = 10;
    ObjectStorageSelection object_storage = 11;
  }
  string format = 12;
}

message DatasetInput {
  repeated string inline_records_json = 1;
  string source_id = 2;
  SourceSpec source = 3;
}

message DatasetProfileRequest {
  string scope_id = 1;
  string scope_kind = 2;
  string extraction_strategy = 3;
  DatasetInput dataset = 4;
  repeated string feature_fields = 5;
  string label_field = 6;
  int32 batch_size = 7;
}

message DatasetProfileResponse {
  string scope_id = 1;
  string scope_kind = 2;
  string extraction_strategy = 3;
  int32 record_count = 4;
  repeated string feature_fields = 5;
  string label_field = 6;
  repeated string numeric_fields = 7;
  repeated string categorical_fields = 8;
  int32 partition_count = 9;
  repeated string suggested_models = 10;
}

message ModelJobRequest {
  string scope_id = 1;
  string scope_kind = 2;
  string task_type = 3;
  string model_family = 4;
  DatasetInput dataset = 5;
  repeated string feature_fields = 6;
  string label_field = 7;
  map<string, string> hyperparameters = 8;
  string artifact_prefix = 9;
  string model_version = 10;
}

message ModelJobResponse {
  string job_id = 1;
  string status = 2;
  string scope_id = 3;
  string scope_kind = 4;
  string task_type = 5;
  string model_family = 6;
  int32 record_count = 7;
  int32 feature_count = 8;
  int32 batch_count = 9;
  string artifact_uri = 10;
  int64 started_at = 11;
  int64 completed_at = 12;
}

message SourceValidationRequest {
  string source_id = 1;
}

message SourceValidationResponse {
  bool valid = 1;
  repeated string errors = 2;
  repeated string warnings = 3;
}

message WorkloadComponent {
  string name = 1;
  string image = 2;
  string kind = 3;
  int32 replicas = 4;
  string schedule = 5;
  repeated string args = 6;
}

message WorkloadCompileRequest {
  string plan_id = 1;
  string namespace = 2;
  repeated WorkloadComponent components = 3;
  bool include_services = 4;
  bool include_config_maps = 5;
}

message WorkloadManifest {
  string component_name = 1;
  string kind = 2;
  string deployment_yaml = 3;
  string service_yaml = 4;
  string config_map_yaml = 5;
}

message WorkloadCompileResponse {
  string plan_id = 1;
  string namespace = 2;
  repeated WorkloadManifest manifests = 3;
  string combined_yaml = 4;
}

service GMAControl {
  rpc RegisterAgent (RegisterRequest) returns (RegisterResponse);
  rpc SendHeartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc PushTelemetry (TelemetryEnvelope) returns (TelemetryAck);
  rpc SyncDeployment (DeploymentSyncRequest) returns (DeploymentSyncResponse);
}

service LMAControl {
  rpc DeployBundle (DeployBundleCommand) returns (CommandStatus);
  rpc TriggerRun (TriggerRunCommand) returns (CommandStatus);
}

service SourceService {
  rpc RegisterSource (SourceSpec) returns (SourceSpec);
  rpc ValidateSource (SourceValidationRequest) returns (SourceValidationResponse);
}

service DatasetService {
  rpc ProfileDataset (DatasetProfileRequest) returns (DatasetProfileResponse);
}

service ModelExecutionService {
  rpc RunModel (ModelJobRequest) returns (ModelJobResponse);
}

service WorkloadCompiler {
  rpc CompileWorkload (WorkloadCompileRequest) returns (WorkloadCompileResponse);
}
