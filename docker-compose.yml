services:
  gma:
    build:
      context: .
      dockerfile: agents/gma/Dockerfile
    container_name: dagents-gma
    env_file:
      - ./env/.env.shared
      - ./env/.env.gma
    environment:
      GMA_APP_ENV: cloud
    ports:
      - "${GMA_HOST_PORT}:${GMA_API_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, urllib.request; urllib.request.urlopen(\"http://127.0.0.1:%s/health\" % os.environ[\"GMA_API_PORT\"])'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  lma:
    build:
      context: .
      dockerfile: agents/lma/Dockerfile
    container_name: dagents-lma
    env_file:
      - ./env/.env.shared
      - ./env/.env.lma
    environment:
      LMA_APP_ENV: cloud
    depends_on:
      gma:
        condition: service_healthy
    ports:
      - "${LMA_HOST_PORT}:${LMA_API_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, urllib.request; urllib.request.urlopen(\"http://127.0.0.1:%s/health\" % os.environ[\"LMA_API_PORT\"])'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  model-service:
    build:
      context: .
      dockerfile: services/model-service/Dockerfile
    container_name: dagents-model-service
    env_file:
      - ./env/.env.shared
      - ./env/.env.model-service
    environment:
      APP_ENV: cloud
    ports:
      - "${MODEL_SERVICE_HOST_PORT}:${MODEL_SERVICE_CONTAINER_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, urllib.request; urllib.request.urlopen(\"http://127.0.0.1:%s/api/v1/health\" % os.environ[\"API_PORT\"])'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pipeline-service:
    build:
      context: .
      dockerfile: services/pipeline-service/Dockerfile
    container_name: dagents-pipeline-service
    env_file:
      - ./env/.env.shared
      - ./env/.env.pipeline-service
    environment:
      APP_ENV: cloud
    ports:
      - "${PIPELINE_SERVICE_HOST_PORT}:${PIPELINE_SERVICE_CONTAINER_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, urllib.request; urllib.request.urlopen(\"http://127.0.0.1:%s/api/v1/health\" % os.environ[\"API_PORT\"])'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  core-service:
    build:
      context: .
      dockerfile: services/core-service/Dockerfile
    container_name: dagents-core-service
    env_file:
      - ./env/.env.shared
      - ./env/.env.core-service
    environment:
      APP_ENV: cloud
    depends_on:
      gma:
        condition: service_healthy
      lma:
        condition: service_healthy
      model-service:
        condition: service_healthy
      pipeline-service:
        condition: service_healthy
    ports:
      - "${CORE_SERVICE_HOST_PORT}:${CORE_SERVICE_CONTAINER_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, urllib.request; urllib.request.urlopen(\"http://127.0.0.1:%s/api/v1/health\" % os.environ[\"API_PORT\"])'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  spring-control-service:
    build:
      context: .
      dockerfile: services/spring-services/spring-control-service/Dockerfile
    container_name: dagents-spring-control-service
    env_file:
      - ./env/.env.spring-control-service
    environment:
      DAGENTS_CONTROL_ENVIRONMENT: cloud
    ports:
      - "${SPRING_CONTROL_SERVICE_HOST_PORT}:${SPRING_CONTROL_SERVICE_CONTAINER_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$$SERVER_PORT/api/v1/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  spring-core-service:
    build:
      context: .
      dockerfile: services/spring-services/spring-core-service/Dockerfile
    container_name: dagents-spring-core-service
    env_file:
      - ./env/.env.shared
      - ./env/.env.spring-core-service
    environment:
      DAGENTS_CORE_ENVIRONMENT: cloud
    depends_on:
      spring-control-service:
        condition: service_healthy
      gma:
        condition: service_healthy
      lma:
        condition: service_healthy
      model-service:
        condition: service_healthy
      pipeline-service:
        condition: service_healthy
    ports:
      - "${SPRING_CORE_SERVICE_HOST_PORT}:${SPRING_CORE_SERVICE_CONTAINER_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$$SERVER_PORT/api/v1/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
